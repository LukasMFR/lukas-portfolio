<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Page not found | Lukas Mauffre</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0b6557" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#080c12" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/lukas-portfolio/assets/icons/favicon.svg" />

    <script>
      (function () {
        try {
          var saved = localStorage.getItem("lukas-portfolio-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved === "light" || saved === "dark" ? saved : prefersDark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <link rel="stylesheet" href="/lukas-portfolio/css/style.css" />
    <style>
      .error-page {
        position: relative;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
      }
      .error-inner {
        max-width: 34rem;
      }
      .error-code {
        font-family: var(--font-mono);
        font-weight: 500;
        font-size: clamp(4.5rem, 18vw, 9rem);
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--accent);
      }
      .error-title {
        margin-top: 1rem;
        font-size: clamp(1.5rem, 1.2rem + 1.4vw, 2.2rem);
        letter-spacing: -0.02em;
      }
      .error-copy {
        margin-top: 0.9rem;
        color: var(--text-2);
        font-size: 1.05rem;
      }
      .error-actions {
        margin-top: 2rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="site-background" aria-hidden="true">
      <div class="site-glow site-glow-one"></div>
      <div class="site-glow site-glow-two"></div>
      <div class="site-grid"></div>
    </div>
    <div class="site-grain" aria-hidden="true"></div>

    <main class="error-page">
      <div class="error-inner">
        <div class="error-code">404</div>
        <h1 class="error-title">This page took a wrong turn</h1>
        <p class="error-copy">
          The page you are looking for does not exist or has moved. Let's get you back on track.
        </p>
        <div class="error-actions">
          <a class="button button-primary" href="/lukas-portfolio/">
            <span>Back to home</span>
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M13 6l6 6-6 6" />
              </svg>
            </span>
          </a>
          <a class="button button-secondary" href="/lukas-portfolio/#contact">
            <span>Contact</span>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
