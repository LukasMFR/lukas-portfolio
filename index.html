<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lukas Mauffre | Cybersecurity, Systems &amp; Web Engineering</title>
    <meta
      name="description"
      content="Portfolio of Lukas Mauffre: cybersecurity, systems, networks, infrastructure, IAM and web engineering. Bilingual, designed and hand-coded from scratch."
    />
    <meta

      content="Lukas Mauffre, cybersecurity, systems, networks, infrastructure, IAM, Active Directory, pentest, web development, portfolio"

    <meta name="author" content="Lukas Mauffre" />
    <meta name="theme-color" content="#0b6557" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#080c12" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Lukas Mauffre | Cybersecurity, Systems &amp; Web Engineering"
    />
    <meta
      property="og:description"
      content="Bilingual portfolio covering cybersecurity, systems, networks, infrastructure, IAM and web engineering."
    />
    <meta property="og:image" content="assets/images/profile/profile-photo.webp" />
    <meta property="og:locale" content="en_US" />

    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

    <link
      rel="preload"
      href="assets/fonts/geist-sans-400.woff2"
      as="font"

      crossorigin
    />
    <link
      rel="preload"

    <link

      href="assets/fonts/geist-mono-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <script>
      /* Set theme before paint to avoid a flash of the wrong colour scheme. */
      (function () {
        try {
          var saved = localStorage.getItem("lukas-portfolio-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved === "light" || saved === "dark" ? saved : prefersDark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <div class="site-background" aria-hidden="true">

      <div class="site-grid"></div>
    </div>
    <div class="site-grain" aria-hidden="true"></div>

    <header class="site-header" id="site-header"></header>

    <main id="main-content">

      <section id="projects" class="section"></section>

    <footer class="site-footer" id="site-footer"></footer>

    <noscript>

    <script defer src="js/main.js"></script>
  </body>
</html>
